apiVersion: v1
kind: ConfigMap
metadata:
  name: notification-service-config
  namespace: banking-system
  labels:
    app: notification-service
data:
  MONGODB_HOST: "notification-db"
  MONGODB_PORT: "27017"
  MONGODB_DATABASE: "notification_db"
  MONGODB_USER: "notif_user"
  RABBITMQ_HOST: "rabbitmq"
  RABBITMQ_PORT: "5672"
  RABBITMQ_USER: "guest"
  HIGH_VALUE_THRESHOLD: "50000"
  MAX_RETRY_COUNT: "3"
  PORT: "8004"
  LOG_LEVEL: "INFO"
  SERVICE_VERSION: "1.0.0"
  ENABLE_RABBIT_CONSUMER: "true"
  ENABLE_HSTS: "false"
